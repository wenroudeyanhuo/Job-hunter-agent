services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ADDR: ":8080"
      APP_DB_PATH: /data/job-hunter-agent.db
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
      SOURCE_URLS: ${SOURCE_URLS:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-}
    volumes:
      - job-hunter-data:/data
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  job-hunter-data:
